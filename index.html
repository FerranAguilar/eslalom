<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B3A5C">
<title>SLTimer — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f4f4f4;min-height:100vh;-webkit-tap-highlight-color:transparent}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}
.topbar{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.12);padding:12px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:10}
.topbar h1{font-size:16px;font-weight:600;color:#111;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.back{font-size:22px;color:#666;background:none;border:none;cursor:pointer;padding:0 4px;line-height:1}
.content{flex:1;padding:16px;display:flex;flex-direction:column;gap:12px;padding-bottom:24px}
input,select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px;background:#fff;color:#111;font-family:inherit;-webkit-appearance:none}
input:focus,select:focus{outline:none;border-color:#185FA5}
label{font-size:12px;color:#666;margin-bottom:4px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:16px}
.btn{width:100%;padding:13px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:1px solid #ddd;background:#fff;color:#111;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn.primary{background:#185FA5;border-color:#185FA5;color:#fff}
.btn.success{background:#0F6E56;border-color:#0F6E56;color:#fff}
.btn.danger{background:#A32D2D;border-color:#A32D2D;color:#fff}
.btn.sm{padding:8px 14px;font-size:13px;width:auto}
.btn.outline-blue{border-color:#185FA5;color:#185FA5;background:#fff}
.btn.outline-green{border-color:#0F6E56;color:#0F6E56;background:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed}
.tabs{display:flex;border-bottom:1px solid #eee;background:#fff}
.tab{flex:1;padding:11px;font-size:13px;font-weight:600;color:#888;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit}
.tab.active{color:#185FA5;border-bottom-color:#185FA5}
.feed-item{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:0.5px solid #f0f0f0}
.feed-item:last-child{border-bottom:none}
.feed-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:100px;background:#E6F1FB;color:#0C447C;white-space:nowrap}
.feed-who{font-size:10px;font-weight:600;padding:2px 6px;border-radius:100px;background:#f0f0f0;color:#666;white-space:nowrap}
.feed-del{background:none;border:none;cursor:pointer;color:#bbb;font-size:18px;padding:0 4px;flex-shrink:0}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1B3A5C;color:#fff;padding:10px 20px;border-radius:100px;font-size:14px;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;z-index:99;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1}
.toast.err{background:#A32D2D}
.empty{text-align:center;padding:20px 0;color:#aaa;font-size:14px}
.sl{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.divider{height:0.5px;background:#eee;margin:14px 0}
.pal-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pal-num{width:26px;height:26px;border-radius:50%;background:#E6F1FB;color:#0C447C;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pal-row input{flex:1;padding:8px 10px;font-size:14px}
.ctx-info{background:#f7f7f7;border-radius:8px;padding:8px 12px;font-size:13px;color:#666;text-align:center}
.ctx-info strong{color:#111}
.overwrite-warn{background:#FAEEDA;border:0.5px solid #FAC775;border-radius:8px;padding:8px 12px;font-size:12px;color:#633806;text-align:center;display:none}
.overwrite-warn.show{display:block}

/* ── SLTimer logotipo ── */
.slt-logo{display:flex;align-items:baseline;line-height:1}
.slt-big{
font-family:'Bebas Neue',sans-serif;
font-size:80px;
color:#1B3A5C;
display:inline-block;
position:relative;
transform:skewX(-18deg);
transform-origin:bottom center;
}
.slt-big::before{
content:attr(data-l);
position:absolute;
top:0;left:-12px;
color:inherit;
opacity:.18;
filter:blur(2px);
transform:skewX(-6deg);
pointer-events:none;
}
.slt-big::after{
content:attr(data-l);
position:absolute;
top:0;left:-22px;
color:inherit;
opacity:.07;
filter:blur(4px);
transform:skewX(-10deg);
pointer-events:none;
}
.slt-small{
font-family:'Bebas Neue',sans-serif;
font-size:42px;
color:#1B3A5C;
display:inline-block;
transform:skewX(-18deg);
transform-origin:bottom center;
align-self:flex-end;
padding-bottom:4px;
}
/* Topbar variant */
.slt-logo-sm .slt-big{font-size:30px}
.slt-logo-sm .slt-big::before{left:-5px}
.slt-logo-sm .slt-big::after{left:-9px}
.slt-logo-sm .slt-small{font-size:16px;padding-bottom:2px}

/* Spinner/Loading */
.spinner{width:22px;height:22px;border:2px solid #ddd;border-top-color:#185FA5;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay{position:fixed;inset:0;background:rgba(255,255,255,.88);display:none;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.overlay.show{display:flex}
.overlay p{font-size:14px;color:#666;margin-top:4px}
/* Auth */
.auth-logo{font-size:44px;text-align:center;margin:8px 0 2px}
.auth-title{font-size:24px;font-weight:700;text-align:center;color:#111;margin-bottom:4px}
.auth-sub{font-size:14px;color:#888;text-align:center;margin-bottom:20px}
.auth-toggle{text-align:center;font-size:14px;color:#888;margin-top:12px}
.auth-toggle button{background:none;border:none;color:#185FA5;font-weight:600;cursor:pointer;font-size:14px;font-family:inherit}
.ig{margin-bottom:12px}
/* Room code */
.room-code{font-size:40px;font-weight:700;letter-spacing:8px;text-align:center;color:#185FA5;padding:12px 0;font-variant-numeric:tabular-nums}
.live-dot{width:8px;height:8px;border-radius:50%;background:#1E6B3C;display:inline-block;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.trainer-chip{display:inline-flex;align-items:center;gap:4px;background:#f0f0f0;border-radius:100px;padding:4px 10px;font-size:12px;font-weight:600;color:#444;margin:2px}
/* Crono */
.chrono-time{font-size:56px;font-weight:300;color:#111;text-align:center;letter-spacing:-2px;font-variant-numeric:tabular-nums;line-height:1}
.chrono-pen{font-size:14px;font-weight:600;text-align:center;margin-top:4px;min-height:20px;color:#993556}
.chrono-main-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:20px}
.c-start{width:80px;height:80px;border-radius:50%;background:#1E6B3C;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.c-start.running{background:#A32D2D}
.c-start.overwrite:not(.running){background:#C55A11}
.c-start svg{width:32px;height:32px;fill:white}
.c-aux{width:48px;height:48px;border-radius:50%;background:#f2f2f2;border:1px solid #ddd;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.c-aux svg{width:20px;height:20px;fill:#666}
.c-save{width:48px;height:48px;border-radius:50%;background:#E1F5EE;border:1px solid #9FE1CB;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;pointer-events:none;transition:opacity .15s}
.c-save.visible{opacity:1;pointer-events:auto}
.c-save svg{width:20px;height:20px;fill:#085041}
.clbl{font-size:10px;color:#aaa;text-align:center;margin-top:5px}
.pen-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.pen-btn{height:44px;border-radius:8px;border:1px solid;cursor:pointer;font-family:inherit;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px;font-size:13px;width:100%}
.pen-btn:active{transform:scale(.96)}
.pen-btn.a2{border-color:#F5C4B3;background:#FAECE7;color:#993C1D}
.pen-btn.a50{border-color:#F7C1C1;background:#FCEBEB;color:#A32D2D}
.pen-btn.s2{border-color:#C0DD97;background:#EAF3DE;color:#3B6D11}
.pen-btn.s50{border-color:#9FE1CB;background:#E1F5EE;color:#085041}
.psl{font-size:11px;color:#aaa;text-align:center;margin-bottom:4px}
/* Resumen */
.rpt{font-size:16px;font-weight:600;color:#111;margin-bottom:12px;padding-bottom:10px;border-bottom:0.5px solid #eee}
.rmb{margin-bottom:14px}
.rml{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.rtr{display:flex;justify-content:space-between;align-items:center;padding:6px 0 6px 10px;border-bottom:0.5px solid #f0f0f0}
.rtr:last-child{border-bottom:none}
.rtn{font-size:13px;color:#888}
.rtv{font-size:13px;font-weight:600;color:#111}
.rtv.best{color:#1E6B3C}
.rpr{display:flex;justify-content:space-between;padding:5px 10px 0;font-size:12px;color:#993C1D}
.rto{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:#f7f7f7;border-radius:8px;margin-top:4px}
.rto span:first-child{font-size:13px;color:#888}
.rto span:last-child{font-size:14px;font-weight:600;color:#111}
.tbox{border-radius:8px;padding:12px 14px;margin-top:4px}
.tbox.real{background:#E1F5EE}
.tbox.teo{background:#E6F1FB}
.tbox .tl{font-size:12px;font-weight:600;margin-bottom:2px}
.tbox .tv{font-size:22px;font-weight:600}
.tbox.real .tl{color:#085041}.tbox.real .tv{color:#0F6E56}
.tbox.teo .tl{color:#0C447C}.tbox.teo .tv{color:#185FA5}
.mr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;margin-top:4px}
.mr span:first-child{font-size:13px;color:#888}
.mr span:last-child{font-size:14px;font-weight:600;color:#A32D2D}
.toggle{width:44px;height:26px;border-radius:13px;background:#ddd;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:#185FA5}
.toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s}
.toggle.on::after{left:21px}
.share-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0}
.share-row span{font-size:14px;color:#111}
</style>
</head>
<body>

<div class="overlay" id="overlay"><div class="spinner"></div><p id="overlay-msg">Cargando...</p></div>

<!-- AUTH -->
<div id="s-auth" class="screen active">
  <div class="content" style="justify-content:center;max-width:420px;margin:0 auto;width:100%">
    <div style="text-align:center;margin-bottom:0px;position:relative;display:inline-block">
      <img src="logoslt.svg" style="width:400px;height:400px;object-fit:contain;display:inline-block;
      filter:
        drop-shadow(-12px 0px 2px rgba(27,58,92,0.18))
        drop-shadow(-22px 0px 4px rgba(27,58,92,0.07));" alt="SLTimer">
    </div>
    <div style="text-align:center;margin-bottom:20px">
      <div style="filter:drop-shadow(-12px 0px 2px rgba(27,58,92,0.18)) drop-shadow(-22px 0px 4px rgba(27,58,92,0.07))">
        <div class="slt-logo" style="justify-content:center;margin-top:-140px">
          <span class="slt-big" data-l="S">S</span>
          <span class="slt-big" data-l="L">L</span>
          <span class="slt-big" data-l="T">T</span>
          <span class="slt-small">imer</span>
        </div>
      </div>
    </div>
    <div class="auth-sub" id="auth-sub">Inicia sesión para continuar</div>
    <div class="card">
      <div class="ig"><label>Email</label><input id="auth-email" type="email" placeholder="tu@email.com" autocomplete="email"></div>
      <div class="ig"><label>Contraseña</label><input id="auth-pass" type="password" placeholder="••••••••"></div>
      <div class="ig" id="auth-p2w" style="display:none"><label>Repite la contraseña</label><input id="auth-pass2" type="password" placeholder="••••••••"></div>
      <button class="btn primary" id="auth-btn" onclick="doAuth()">Entrar</button>
      <div class="auth-toggle">
        <span id="auth-ttxt">¿No tienes cuenta?</span>
        <button onclick="toggleAuthMode()">Regístrate</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB = 'https://duwmhatcqxlwtqdnzhle.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1d21oYXRjcXhsd3RxZG56aGxlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MzIwMDMsImV4cCI6MjA5MzMwODAwM30.CkvnBvuo8rS2cv1Uts6dmUATUMbW9Dgjg4L29HE9Wdo';

async function api(path, opts={}){
  const h={'apikey':KEY,'Content-Type':'application/json',...(opts.headers||{})};
  const r=await fetch(SB+path,{...opts,headers:h});
  const t=await r.text();
  let j; try{j=JSON.parse(t);}catch{j=t;}
  if(!r.ok) throw new Error(j?.message||j?.error_description||JSON.stringify(j));
  return j;
}

function showLoad(msg='Cargando...'){$('overlay-msg').textContent=msg;$('overlay').classList.add('show');}
function hideLoad(){$('overlay').classList.remove('show');}

let _tTimer;
function toast(msg,err=false){
  const el=$('toast');el.textContent=msg;
  el.classList.toggle('err',err);el.classList.add('show');
  clearTimeout(_tTimer);_tTimer=setTimeout(()=>el.classList.remove('show'),2500);
}

const $=id=>document.getElementById(id);

let _mode='login';
function toggleAuthMode(){
  _mode=_mode==='login'?'register':'login';
  const r=_mode==='register';
  $('auth-sub').textContent=r?'Crea tu cuenta':'Inicia sesión para continuar';
  $('auth-btn').textContent=r?'Registrarse':'Entrar';
  $('auth-ttxt').textContent=r?'¿Ya tienes cuenta?':'¿No tienes cuenta?';
  $('auth-p2w').style.display=r?'block':'none';
  document.querySelector('.auth-toggle button').textContent=r?'Inicia sesión':'Regístrate';
}

async function doAuth(){
  const email=$('auth-email').value.trim(), pass=$('auth-pass').value;
  if(!email||!pass){toast('Rellena email y contraseña',true);return;}
  if(_mode==='register'&&$('auth-pass2').value!==pass){toast('Las contraseñas no coinciden',true);return;}
  showLoad(_mode==='login'?'Iniciando sesión...':'Creando cuenta...');
  $('auth-btn').disabled=true;
  try{
    const ep=_mode==='login'?'/token?grant_type=password':'/signup';
    const d=await api('/auth/v1'+ep,{method:'POST',body:JSON.stringify({email,password:pass})});
    if(_mode==='register'&&!d.access_token){
      hideLoad();$('auth-btn').disabled=false;
      toast('Cuenta creada. Revisa tu email y luego inicia sesión.');
      toggleAuthMode();return;
    }
    localStorage.setItem('slt_tok', d.access_token);
    localStorage.setItem('slt_uid', d.user?.id);
    localStorage.setItem('slt_email', d.user?.email);
    hideLoad();
    window.location.href = 'app.html';
  }catch(e){hideLoad();$('auth-btn').disabled=false;toast(e.message,true);}
}

window.addEventListener('DOMContentLoaded', ()=>{
  if(localStorage.getItem('slt_tok')){
    window.location.href = 'app.html';
  }
});

document.addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});
</script>

</body>
</html>
